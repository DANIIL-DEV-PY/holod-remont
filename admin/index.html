<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Админ-панель — Холод Сервис</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <style>
    :root {
      --color-primary: #2f7fa8;
      --color-primary-dark: #1f5f80;
      --color-accent: #2fb8c4;
      --color-bg: #eef3f8;
      --color-surface-solid: #ffffff;
      --color-border: rgba(31, 95, 128, 0.14);
      --color-text: #1c2530;
      --color-text-muted: #5b6b7c;
      --radius-lg: 20px;
      --radius-md: 12px;
      --shadow-card: 0 10px 30px rgba(31, 95, 128, 0.12), 0 2px 8px rgba(31, 95, 128, 0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 24px;
    }
    .card {
      background: var(--color-surface-solid);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 24px;
    }

    /* --- Логин --- */
    #login-view { max-width: 360px; margin: 80px auto 0; }
    #login-view label { display: block; font-size: 14px; color: var(--color-text-muted); margin-bottom: 6px; }
    #login-view input {
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      font-size: 15px;
      margin-bottom: 14px;
    }
    #login-view button, .logout-btn {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--color-primary);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    #login-view button:hover, .logout-btn:hover { background: var(--color-primary-dark); }
    #login-error { color: #c0392b; font-size: 14px; margin-bottom: 10px; min-height: 18px; }

    /* --- Дашборд --- */
    .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .logout-btn { width: auto; padding: 8px 16px; font-size: 13px; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-tile {
      background: var(--color-surface-solid);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 16px;
    }
    .stat-tile .label { font-size: 13px; color: var(--color-text-muted); margin-bottom: 6px; }
    .stat-tile .value { font-size: 26px; font-weight: 700; color: var(--color-primary-dark); }
    .stat-tile .sub { font-size: 12px; color: var(--color-text-muted); margin-top: 4px; }
    .delta-up { color: #1f8a4c; }
    .delta-down { color: #c0392b; }

    .chart-title { font-size: 15px; font-weight: 600; margin: 0 0 14px; }
    .chart {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 160px;
      padding: 0 4px;
    }
    .chart .bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
    }
    .chart .bar {
      width: 100%;
      max-width: 22px;
      background: linear-gradient(180deg, var(--color-accent), var(--color-primary));
      border-radius: 4px 4px 0 0;
      min-height: 2px;
    }
    .chart .bar-label {
      font-size: 9px;
      color: var(--color-text-muted);
      margin-top: 6px;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      height: 32px;
    }

    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--color-border); }
    th { color: var(--color-text-muted); font-weight: 600; font-size: 13px; }

    .hidden { display: none !important; }
    .loading { color: var(--color-text-muted); padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Холод Сервис — статистика посещений</h1>

    <div id="login-view" class="card">
      <label for="password">Пароль</label>
      <input type="password" id="password" autocomplete="current-password" />
      <div id="login-error"></div>
      <button id="login-btn">Войти</button>
    </div>

    <div id="dashboard-view" class="hidden">
      <div class="top-row">
        <span></span>
        <button class="logout-btn" id="logout-btn">Выйти</button>
      </div>

      <div class="stat-grid" id="stat-grid"></div>

      <div class="card">
        <p class="chart-title">Просмотры за последние 30 дней</p>
        <div class="chart" id="chart"></div>
      </div>

      <table id="table">
        <thead>
          <tr><th>Дата</th><th>Просмотры</th><th>Уникальные</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="loading" class="loading hidden">Загрузка…</div>
  </div>

  <script>
    const loginView = document.getElementById('login-view');
    const dashboardView = document.getElementById('dashboard-view');
    const loadingView = document.getElementById('loading');
    const loginError = document.getElementById('login-error');

    function show(view) {
      loginView.classList.add('hidden');
      dashboardView.classList.add('hidden');
      loadingView.classList.add('hidden');
      view.classList.remove('hidden');
    }

    function fmtDate(iso) {
      const [, m, d] = iso.split('-');
      return `${d}.${m}`;
    }

    function renderDelta(current, previous) {
      if (previous === 0) return '';
      const pct = Math.round(((current - previous) / previous) * 100);
      const cls = pct >= 0 ? 'delta-up' : 'delta-down';
      const sign = pct >= 0 ? '+' : '';
      return `<span class="${cls}">${sign}${pct}% к пред. неделе</span>`;
    }

    function renderStats(data) {
      const grid = document.getElementById('stat-grid');
      grid.innerHTML = `
        <div class="stat-tile">
          <div class="label">Сегодня</div>
          <div class="value">${data.today.views}</div>
          <div class="sub">${data.today.uniques} уникальных</div>
        </div>
        <div class="stat-tile">
          <div class="label">За эту неделю</div>
          <div class="value">${data.thisWeek.views}</div>
          <div class="sub">${data.thisWeek.uniques} уникальных · ${renderDelta(data.thisWeek.views, data.lastWeek.views)}</div>
        </div>
        <div class="stat-tile">
          <div class="label">За прошлую неделю</div>
          <div class="value">${data.lastWeek.views}</div>
          <div class="sub">${data.lastWeek.uniques} уникальных</div>
        </div>
      `;

      const max = Math.max(1, ...data.daily.map((d) => d.views));
      const chart = document.getElementById('chart');
      chart.innerHTML = data.daily.map((d) => `
        <div class="bar-wrap" title="${d.date}: ${d.views} просмотров">
          <div class="bar" style="height:${(d.views / max) * 100}%"></div>
          <div class="bar-label">${fmtDate(d.date)}</div>
        </div>
      `).join('');

      const tbody = document.querySelector('#table tbody');
      tbody.innerHTML = data.daily.slice().reverse().map((d) => `
        <tr><td>${d.date}</td><td>${d.views}</td><td>${d.uniques}</td></tr>
      `).join('');
    }

    async function loadStats() {
      show(loadingView);
      const res = await fetch('/.netlify/functions/stats', { credentials: 'same-origin' });
      if (res.status === 401) {
        show(loginView);
        return;
      }
      const data = await res.json();
      renderStats(data);
      show(dashboardView);
    }

    document.getElementById('login-btn').addEventListener('click', async () => {
      loginError.textContent = '';
      const password = document.getElementById('password').value;
      const res = await fetch('/.netlify/functions/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
        credentials: 'same-origin',
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        loginError.textContent = body.error || 'Не удалось войти';
        return;
      }
      loadStats();
    });

    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/.netlify/functions/logout', { method: 'POST', credentials: 'same-origin' });
      show(loginView);
    });

    loadStats();
  </script>
</body>
</html>
